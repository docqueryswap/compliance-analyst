name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install minimal dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn python-multipart python-dotenv pydantic

      - name: Verify app structure
        run: |
          python -c "import os; assert os.path.exists('app.py'), 'app.py missing'"
          python -c "import ast; ast.parse(open('app.py').read()); print('✅ app.py syntax OK')"

      - name: Simulate deployment
        run: |
          echo "🚀 Deployment triggered for commit ${{ github.sha }}"
          echo "✅ CI/CD pipeline passed!"
