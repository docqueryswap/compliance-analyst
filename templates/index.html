<!DOCTYPE html>
<html>
<head>
    <title>Compliance Analyst</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Autonomous Compliance Analyst</h1>
        <p>Upload a contract or policy document. AI agents will audit it and generate a compliance report.</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none">
            <button id="uploadBtn">📤 Choose Document</button>
            <span id="fileName">No file selected</span>
        </div>
        
        <div id="uploadStatus"></div>
        
        <button id="auditBtn" disabled>🔍 Run Compliance Audit</button>
        <button id="streamBtn" disabled>📡 Stream Audit</button>
        
        <div id="output" class="output-box">
            <h3>Audit Report</h3>
            <div id="reportContent">Upload a document to begin.</div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
